<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Life Area Selection</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FCD34D", // Gold for compass/accents
                        "background-light": "#F3F4F6", // Light gray for light mode
                        "background-dark": "#121212", // Deep charcoal/black for dark mode
                        "card-dark": "#2B2830", // Dark grayish-purple for cards
                        "card-light": "#FFFFFF", // White for cards in light mode
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                        sans: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                        'xl': "16px",
                        '2xl': "20px",
                    },
                },
            },
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-sans text-gray-900 dark:text-gray-100 min-h-screen flex justify-center selection:bg-primary selection:text-black">
    <div
        class="w-full max-w-md bg-background-light dark:bg-background-dark min-h-screen relative flex flex-col p-5 md:border-x md:border-gray-200 md:dark:border-gray-800">
        <div class="h-2 w-full"></div>
        <div class="flex justify-end mb-2">
            <button
                class="text-gray-400 hover:text-gray-600 dark:text-gray-400 dark:hover:text-white transition-colors p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10">
                <i class="ph ph-x text-2xl"></i>
            </button>
        </div>
        <div class="flex flex-col items-center mb-8 text-center px-4">
            <div class="relative w-24 h-24 mb-6 flex items-center justify-center">
                <div class="absolute inset-0 bg-yellow-500/10 blur-2xl rounded-full"></div>
                <div
                    class="relative z-10 w-20 h-20 bg-[#FFEBB2] border-[3px] border-[#2C2430] dark:border-[#3E3842] rounded-full shadow-lg flex items-center justify-center overflow-hidden">
                    <div
                        class="w-[85%] h-[85%] bg-yellow-50 rounded-full border border-yellow-200 flex items-center justify-center relative">
                        <div class="absolute top-[15%] left-1/2 -translate-x-1/2 w-3 h-[45%] bg-red-400 rounded-t-full origin-bottom rotate-45 z-20 shadow-sm"
                            style="transform: translateX(-50%) rotate(45deg);"></div>
                        <div class="absolute bottom-[15%] left-1/2 -translate-x-1/2 w-3 h-[45%] bg-slate-300 rounded-b-full origin-top rotate-45 z-10"
                            style="transform: translateX(-50%) rotate(45deg);"></div>
                        <div class="absolute w-2 h-2 bg-white rounded-full z-30 border border-slate-200"></div>
                        <div class="absolute top-1 text-[8px] font-bold text-slate-400 select-none">N</div>
                    </div>
                </div>
                <i class="ph-fill ph-sparkle text-yellow-400 absolute top-0 right-0 text-xl animate-pulse"></i>
                <i class="ph-fill ph-sparkle text-yellow-200/60 absolute bottom-1 left-0 text-sm"></i>
                <i class="ph-fill ph-sparkle text-white/40 absolute top-2 left-2 text-xs"></i>
            </div>
            <h1 class="text-[19px] leading-relaxed font-medium text-gray-800 dark:text-gray-100 max-w-[90%]">
                What's one area of life that's calling for your attention right now?
            </h1>
        </div>
        <div class="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-8">
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-heart text-3xl text-pink-400 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Wellbeing</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-briefcase text-3xl text-amber-600 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Career</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-money text-3xl text-emerald-500 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Finances</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-users-three text-3xl text-blue-400 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Family</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-heart-straight text-3xl text-rose-400 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Romance</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-handshake text-3xl text-yellow-500 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Community</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-bicycle text-3xl text-indigo-400 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Recreation</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-house-line text-3xl text-teal-500 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Environment</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
            <button
                class="w-full group flex items-center justify-between p-4 bg-white dark:bg-card-dark rounded-2xl shadow-sm border border-gray-100 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-[#343038] active:scale-[0.99] transition-all duration-200">
                <div class="flex items-center gap-4">
                    <div class="w-8 flex justify-center">
                        <i class="ph-fill ph-butterfly text-3xl text-violet-400 drop-shadow-sm"></i>
                    </div>
                    <span class="text-[17px] font-medium text-gray-700 dark:text-gray-200">Spirituality</span>
                </div>
                <i
                    class="ph-bold ph-caret-right text-gray-300 dark:text-gray-500 group-hover:text-primary transition-colors text-lg"></i>
            </button>
        </div>
    </div>
    <script>
        // Force dark mode logic for demo purposes to match screenshot immediately
        // In a real app, this would toggle based on user preference
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

</body>

</html>
