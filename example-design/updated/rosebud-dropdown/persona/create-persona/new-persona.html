<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>New Persona</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: "#3b82f6",
                        "background-light": "#F2F2F7", // iOS Light Gray Background
                        "background-dark": "#121212", // Deep Dark Background
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#242426", // Slightly lighter dark for cards
                        "separator-light": "#E5E5EA",
                        "separator-dark": "#38383A",
                    },
                },
            },
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-black dark:text-white font-sans antialiased min-h-screen transition-colors duration-200">
    <header
        class="sticky top-0 z-10 flex items-center justify-between px-4 py-3 bg-background-light dark:bg-background-dark">
        <button
            class="p-2 -ml-2 rounded-full hover:bg-gray-200 dark:hover:bg-zinc-800 transition-colors text-gray-900 dark:text-white">
            <span class="material-icons-outlined text-2xl">arrow_back</span>
        </button>
        <h1 class="text-[17px] font-semibold tracking-tight">New persona</h1>
        <button class="text-gray-400 font-medium text-[17px] px-2 dark:text-zinc-500 cursor-not-allowed">
            Create
        </button>
    </header>
    <main class="px-4 pb-10 max-w-md mx-auto">
        <div class="flex justify-center py-8 mb-2">
            <div class="relative group cursor-pointer">
                <div
                    class="w-28 h-28 rounded-full overflow-hidden border border-gray-300 dark:border-zinc-700 shadow-sm relative bg-orange-600">
                    <img alt="Geometric orange pattern profile picture"
                        class="w-full h-full object-cover opacity-90 mix-blend-overlay"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2KZ0-6YIf01DmKGg_IFU0gZzVUGHG9NryncM4w_FovwLKe0zUINQwjzdlMC_Ds_PX0MS8EcOLMv_5dPsr4XY2LC-qJgIgkTv_cN2m1uT3MUNhhzwD1c565-fMcMPv77Dmbg0kT25BbKQ-q3QHzw3FbMclY5Eui4fwiM_B4e5i2ugfsiRAfhas7RT2wxz0w0k03XDGgQZUIR1UDKR97Hu_ImM5kyoS2YB_dqSFwKmGeaF9CSu-VmB_zl8ym33RHhTzEtzsksZXcSA"
                        style="filter: sepia(100%) hue-rotate(-20deg) saturate(300%) contrast(1.1);" />
                    <div class="absolute inset-0 bg-orange-500/20"></div>
                </div>
                <button
                    class="absolute top-0 right-0 bg-surface-light dark:bg-zinc-700 rounded-full w-8 h-8 shadow-md border border-gray-200 dark:border-zinc-600 text-gray-600 dark:text-gray-300 flex items-center justify-center transform translate-x-1 -translate-y-1">
                    <span class="material-icons-outlined text-sm">edit</span>
                </button>
            </div>
        </div>
        <div class="bg-surface-light dark:bg-surface-dark rounded-xl overflow-hidden shadow-sm mb-6">
            <div class="relative">
                <input
                    class="w-full bg-transparent border-none text-[17px] py-3.5 px-4 placeholder-gray-400 dark:placeholder-zinc-500 focus:ring-0 text-gray-900 dark:text-white h-12"
                    placeholder="Name" type="text" />
                <div class="absolute bottom-0 left-4 right-0 h-[0.5px] bg-separator-light dark:bg-separator-dark"></div>
            </div>
            <div class="relative">
                <input
                    class="w-full bg-transparent border-none text-[17px] py-3.5 px-4 placeholder-gray-400 dark:placeholder-zinc-500 focus:ring-0 text-gray-900 dark:text-white h-12"
                    placeholder="Tagline" type="text" />
                <div class="absolute bottom-0 left-4 right-0 h-[0.5px] bg-separator-light dark:bg-separator-dark"></div>
            </div>
            <button
                class="w-full flex items-center justify-between py-3.5 px-4 bg-transparent hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors text-left group h-12">
                <div class="flex items-center gap-3">
                    <span class="material-icons-outlined text-gray-500 dark:text-gray-400 text-xl">volume_up</span>
                    <span class="text-[17px] text-gray-900 dark:text-white">Voice</span>
                </div>
                <div class="flex items-center gap-1 text-gray-500 dark:text-gray-400">
                    <span class="text-[17px]">Onyx</span>
                    <span class="material-icons-outlined text-xl opacity-60">chevron_right</span>
                </div>
            </button>
        </div>
        <div class="mb-6">
            <h2 class="text-[13px] uppercase tracking-wide text-gray-500 dark:text-zinc-500 mb-2 pl-4">Personalization
            </h2>
            <div class="bg-surface-light dark:bg-surface-dark rounded-xl p-4 shadow-sm relative h-48">
                <textarea
                    class="w-full h-full bg-transparent border-none p-0 resize-none focus:ring-0 text-[17px] leading-relaxed placeholder-gray-400 dark:placeholder-zinc-500 text-gray-900 dark:text-white"
                    placeholder="Describe your desired personality and response style..."></textarea>
                <div class="absolute bottom-4 right-4 text-[13px] font-medium text-gray-400 dark:text-zinc-600">
                    0 / 2000
                </div>
            </div>
        </div>
        <div class="mb-10">
            <h2 class="text-[13px] uppercase tracking-wide text-gray-500 dark:text-zinc-500 mb-2 pl-4">More</h2>
            <div class="bg-surface-light dark:bg-surface-dark rounded-xl overflow-hidden shadow-sm">
                <button
                    class="w-full flex items-center justify-between py-3.5 px-4 bg-transparent hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors text-left h-12">
                    <span class="text-[17px] text-gray-900 dark:text-white">Advanced</span>
                    <span
                        class="material-icons-outlined text-gray-400 dark:text-gray-500 text-xl opacity-60">chevron_right</span>
                </button>
            </div>
        </div>
    </main>
    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

</body>

</html>
