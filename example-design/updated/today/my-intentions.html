<!DOCTYPE html>

<head>

    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Wellness Today Dashboard</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FFFFFF", // Using white as the primary interactive/active color in this dark-heavy design context for simplicity, or lighter grey for light mode
                        "primary-dark": "#1C1C1E", // Dark charcoal for cards
                        "accent-orange": "#FF9500", // For the flame
                        "background-light": "#F2F2F7", // iOS light gray background
                        "background-dark": "#000000", // Pure black or very dark gray for background
                        "card-light": "#FFFFFF",
                        "card-dark": "#1C1C1E",
                        "text-light": "#1C1C1E",
                        "text-dark": "#FFFFFF",
                        "subtext-light": "#8E8E93",
                        "subtext-dark": "#8E8E93",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.25rem',
                        '2xl': '1.5rem',
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }

        .filled-icon {
            font-variation-settings:
                'FILL' 1,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

            <div class="grid grid-cols-2 gap-4">

    <script>
        // Simple script to toggle dark mode for demonstration
        // In a real app, this would detect system preference or user setting
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        } else {
            // Defaulting to dark mode as per primary screenshot request, but checking support
            document.documentElement.classList.add('dark');
        }
    </script>
