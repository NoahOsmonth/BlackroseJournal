<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070B14;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .controls {
      position: fixed;
      right: 14px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2;
    }

    .controls button {
      width: 42px;
      height: 42px;
      border-radius: 21px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(17, 24, 39, 0.72);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      color: #E5E7EB;
      font-size: 19px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .controls button:active {
      transform: scale(0.92);
      background: rgba(31, 41, 55, 0.9);
    }
  </style>
</head>
<body>
  <canvas id="graphCanvas"></canvas>
  <div class="controls" aria-hidden="false">
    <button id="zoomIn" aria-label="Zoom in">+</button>
    <button id="zoomOut" aria-label="Zoom out">&minus;</button>
    <button id="zoomFit" aria-label="Fit graph to view">&#8857;</button>
  </div>
  <script>
    'use strict';

    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    const LAYER_COLORS = {
      episodic: '#A370F7',
      semantic: '#38BDF8',
      profile: '#FB7185',
      procedural: '#34D399',
      note: '#FBBF24',
      working: '#F472B6',
    };
    const FALLBACK_COLOR = '#9CA3AF';

    // -- physics tuning -------------------------------------------------
    const REPULSION = 1500;
    const REPULSION_CUTOFF = 340;
    const SPRING = 0.028;
    const CENTER_GRAVITY = 0.012;
    const CLUSTER_GRAVITY = 0.024;
    const FRICTION = 0.8;
    const COLLISION_PADDING = 16;

    const MIN_SCALE = 0.22;
    const MAX_SCALE = 3;
    const TAP_SLOP = 9;
    const TAP_MS = 350;
    const DOUBLE_TAP_MS = 300;

    let width = 0;
    let height = 0;
    let pixelRatio = 1;

    let nodes = [];
    let links = [];
    let nodeById = new Map();
    let neighborIds = new Set();
    let layerAnchors = new Map();

    let alpha = 0;
    let selectedId = null;
    let hoveredId = null;
    let hasSyncedOnce = false;
    let userHasInteracted = false;

    // camera maps world -> screen: s = w * scale + offset
    const camera = { x: 0, y: 0, scale: 1 };
    let cameraGoal = null; // { x, y, scale }

    let bgGradient = null;
    let vignette = null;
    const stars = [];

    // -- helpers --------------------------------------------------------
    function clamp(value, lo, hi) {
      return Math.min(hi, Math.max(lo, value));
    }

    function seeded(i) {
      const x = Math.sin(i * 127.1 + 311.7) * 43758.5453;
      return x - Math.floor(x);
    }

    const rgbCache = new Map();
    function hexToRgb(hex) {
      let rgb = rgbCache.get(hex);
      if (!rgb) {
        rgb = {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16),
        };
        rgbCache.set(hex, rgb);
      }
      return rgb;
    }

    function rgba(hex, a) {
      const c = hexToRgb(hex);
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
    }

    function lighten(hex, amount) {
      const c = hexToRgb(hex);
      const r = Math.round(c.r + (255 - c.r) * amount);
      const g = Math.round(c.g + (255 - c.g) * amount);
      const b = Math.round(c.b + (255 - c.b) * amount);
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    function nodeColor(node) {
      return LAYER_COLORS[node.layer] || FALLBACK_COLOR;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    // -- host bridge ----------------------------------------------------
    function postToHost(payload) {
      const encoded = JSON.stringify(payload);
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(encoded);
        return;
      }
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(encoded, '*');
      }
    }

    function ingestPayload(raw) {
      try {
        const payload = JSON.parse(raw);
        if (payload.type === 'SYNC_DATA') {
          syncGraph(payload.atoms || [], payload.connections || []);
        }
      } catch {
        postToHost({ type: 'ENGINE_ERROR' });
      }
    }

    // -- graph construction ----------------------------------------------
    function rebuildLayerAnchors() {
      const layers = [];
      nodes.forEach((node) => {
        if (!layers.includes(node.layer)) layers.push(node.layer);
      });
      layers.sort();
      layerAnchors = new Map();
      const radius = layers.length > 1 ? 200 + nodes.length * 2.2 : 0;
      layers.forEach((layer, index) => {
        const angle = (Math.PI * 2 * index) / layers.length - Math.PI / 2;
        layerAnchors.set(layer, {
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
        });
      });
    }

    function syncGraph(newAtoms, newConnections) {
      const previous = nodeById;
      const now = performance.now();
      nodeById = new Map();

      nodes = newAtoms.map((atom, index) => {
        const kept = previous.get(atom.id);
        const node = kept || {
          x: 0, y: 0, vx: 0, vy: 0,
          fixed: false,
          bornAt: now + Math.min(index * 14, 700),
          focusAlpha: 1,
        };
        node.id = atom.id;
        node.title = atom.title || '';
        node.layer = atom.layer;
        node.salience = atom.salience || 3;
        node.r = 9 + node.salience * 1.5;
        node.degree = 0;
        nodeById.set(node.id, node);
        return node;
      });

      rebuildLayerAnchors();

      // seed fresh nodes near their layer cluster with a phyllotaxis spread
      const clusterCounts = new Map();
      nodes.forEach((node, index) => {
        const count = (clusterCounts.get(node.layer) || 0) + 1;
        clusterCounts.set(node.layer, count);
        if (previous.has(node.id)) return;
        const anchor = layerAnchors.get(node.layer) || { x: 0, y: 0 };
        const spread = 30 * Math.sqrt(count);
        const angle = count * 2.39996 + seeded(index) * 0.8;
        node.x = anchor.x + Math.cos(angle) * spread;
        node.y = anchor.y + Math.sin(angle) * spread;
      });

      links = [];
      newConnections.forEach((connection) => {
        const a = nodeById.get(connection.from);
        const b = nodeById.get(connection.to);
        if (!a || !b || a === b) return;
        a.degree += 1;
        b.degree += 1;
        links.push({
          a: a,
          b: b,
          strength: clamp(connection.strength || 0.3, 0.05, 1),
          glow: 0,
        });
      });

      if (selectedId && !nodeById.has(selectedId)) {
        selectedId = null;
      }
      refreshNeighbors();

      alpha = hasSyncedOnce ? 0.6 : 1;

      if (!hasSyncedOnce && nodes.length > 0) {
        hasSyncedOnce = true;
        // settle the layout before the first frame, then ease into the fit
        for (let i = 0; i < 120; i++) stepPhysics();
        fitToView(false);
        const goal = { x: camera.x, y: camera.y, scale: camera.scale };
        camera.scale = goal.scale * 0.82;
        camera.x = width / 2 - (width / 2 - goal.x) * 0.82;
        camera.y = height / 2 - (height / 2 - goal.y) * 0.82;
        cameraGoal = goal;
      }
    }

    function refreshNeighbors() {
      neighborIds = new Set();
      if (!selectedId) return;
      links.forEach((link) => {
        if (link.a.id === selectedId) neighborIds.add(link.b.id);
        if (link.b.id === selectedId) neighborIds.add(link.a.id);
      });
    }

    // -- physics ----------------------------------------------------------
    function stepPhysics() {
      const n = nodes.length;
      const cutoff2 = REPULSION_CUTOFF * REPULSION_CUTOFF;

      for (let i = 0; i < n; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < n; j++) {
          const b = nodes[j];
          let dx = a.x - b.x;
          let dy = a.y - b.y;
          let d2 = dx * dx + dy * dy;
          if (d2 > cutoff2) continue;
          if (d2 < 1) { dx = seeded(i + j) - 0.5; dy = seeded(j - i) - 0.5; d2 = 1; }
          const d = Math.sqrt(d2);
          const force = (REPULSION * alpha) / d2;
          const fx = (dx / d) * force;
          const fy = (dy / d) * force;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }
      }

      links.forEach((link) => {
        const dx = link.b.x - link.a.x;
        const dy = link.b.y - link.a.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        const rest = clamp(link.a.r + link.b.r + 110 - link.strength * 60, 46, 190);
        const force = (d - rest) * SPRING * (0.4 + link.strength * 0.6) * alpha;
        const fx = (dx / d) * force;
        const fy = (dy / d) * force;
        link.a.vx += fx; link.a.vy += fy;
        link.b.vx -= fx; link.b.vy -= fy;
      });

      nodes.forEach((node) => {
        const anchor = layerAnchors.get(node.layer);
        if (anchor) {
          node.vx += (anchor.x - node.x) * CLUSTER_GRAVITY * alpha;
          node.vy += (anchor.y - node.y) * CLUSTER_GRAVITY * alpha;
        }
        node.vx -= node.x * CENTER_GRAVITY * alpha;
        node.vy -= node.y * CENTER_GRAVITY * alpha;

        if (node.fixed) { node.vx = 0; node.vy = 0; return; }
        node.vx *= FRICTION;
        node.vy *= FRICTION;
        node.x += clamp(node.vx, -40, 40);
        node.y += clamp(node.vy, -40, 40);
      });

      // resolve overlaps so labels and small nodes stay readable
      for (let i = 0; i < n; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < n; j++) {
          const b = nodes[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const min = a.r + b.r + COLLISION_PADDING;
          const d = Math.hypot(dx, dy);
          if (d >= min || d === 0) continue;
          const push = (min - d) / d * 0.5;
          const px = dx * push;
          const py = dy * push;
          if (!a.fixed) { a.x -= px; a.y -= py; }
          if (!b.fixed) { b.x += px; b.y += py; }
        }
      }
    }

    // -- camera -----------------------------------------------------------
    function fitToView(animate) {
      if (nodes.length === 0) return;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      nodes.forEach((node) => {
        minX = Math.min(minX, node.x - node.r);
        minY = Math.min(minY, node.y - node.r);
        maxX = Math.max(maxX, node.x + node.r);
        maxY = Math.max(maxY, node.y + node.r);
      });
      const pad = 64;
      const boxW = Math.max(120, maxX - minX + pad * 2);
      const boxH = Math.max(120, maxY - minY + pad * 2 + 30);
      const scale = clamp(Math.min(width / boxW, height / boxH), MIN_SCALE, 1.4);
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const goal = {
        x: width / 2 - cx * scale,
        y: height / 2 - cy * scale,
        scale: scale,
      };
      if (animate) {
        cameraGoal = goal;
      } else {
        camera.x = goal.x; camera.y = goal.y; camera.scale = goal.scale;
        cameraGoal = null;
      }
    }

    function focusOnNode(node) {
      const scale = camera.scale < 0.85 ? 1.05 : camera.scale;
      cameraGoal = {
        x: width / 2 - node.x * scale,
        y: height * 0.34 - node.y * scale,
        scale: scale,
      };
    }

    function zoomAt(screenX, screenY, factor) {
      cameraGoal = null;
      const next = clamp(camera.scale * factor, MIN_SCALE, MAX_SCALE);
      const ratio = next / camera.scale;
      camera.x = screenX - (screenX - camera.x) * ratio;
      camera.y = screenY - (screenY - camera.y) * ratio;
      camera.scale = next;
    }

    function tickCamera() {
      if (!cameraGoal) return;
      camera.x += (cameraGoal.x - camera.x) * 0.16;
      camera.y += (cameraGoal.y - camera.y) * 0.16;
      camera.scale += (cameraGoal.scale - camera.scale) * 0.16;
      if (
        Math.abs(cameraGoal.x - camera.x) < 0.4 &&
        Math.abs(cameraGoal.y - camera.y) < 0.4 &&
        Math.abs(cameraGoal.scale - camera.scale) < 0.002
      ) {
        camera.x = cameraGoal.x;
        camera.y = cameraGoal.y;
        camera.scale = cameraGoal.scale;
        cameraGoal = null;
      }
    }

    function toWorld(screenX, screenY) {
      return {
        x: (screenX - camera.x) / camera.scale,
        y: (screenY - camera.y) / camera.scale,
      };
    }

    // -- rendering ----------------------------------------------------------
    function rebuildBackdrop() {
      bgGradient = ctx.createRadialGradient(
        width / 2, height * 0.38, 0,
        width / 2, height * 0.38, Math.max(width, height) * 0.85
      );
      bgGradient.addColorStop(0, '#101A2E');
      bgGradient.addColorStop(0.55, '#0A101F');
      bgGradient.addColorStop(1, '#05070D');

      vignette = ctx.createRadialGradient(
        width / 2, height / 2, Math.min(width, height) * 0.42,
        width / 2, height / 2, Math.max(width, height) * 0.78
      );
      vignette.addColorStop(0, 'rgba(0,0,0,0)');
      vignette.addColorStop(1, 'rgba(0,0,0,0.45)');

      stars.length = 0;
      const count = Math.round((width * height) / 14000);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: seeded(i * 3 + 1) * width,
          y: seeded(i * 3 + 2) * height,
          r: 0.4 + seeded(i * 3 + 3) * 1.1,
          phase: seeded(i * 7) * Math.PI * 2,
        });
      }
    }

    function drawBackdrop(now) {
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, width, height);

      const driftX = camera.x * 0.04;
      const driftY = camera.y * 0.04;
      stars.forEach((star, i) => {
        const sx = ((star.x + driftX) % width + width) % width;
        const sy = ((star.y + driftY) % height + height) % height;
        const twinkle = 0.22 + Math.sin(now * 0.0011 + star.phase) * 0.14;
        ctx.beginPath();
        ctx.arc(sx, sy, star.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(226,232,240,' + twinkle.toFixed(3) + ')';
        ctx.fill();
      });
    }

    function edgeAlphaTarget(link) {
      const base = 0.16 + link.strength * 0.3;
      if (!selectedId) return base;
      if (link.a.id === selectedId || link.b.id === selectedId) {
        return Math.min(0.95, base + 0.5);
      }
      return 0.04;
    }

    function drawLinks() {
      links.forEach((link) => {
        link.glow += (edgeAlphaTarget(link) - link.glow) * 0.12;
        if (link.glow < 0.015) return;

        const ax = link.a.x, ay = link.a.y;
        const bx = link.b.x, by = link.b.y;
        const dx = bx - ax, dy = by - ay;
        const d = Math.hypot(dx, dy);
        if (d < 1) return;

        // gentle perpendicular bow so dense regions stay legible
        const mx = (ax + bx) / 2 - (dy / d) * d * 0.08;
        const my = (ay + by) / 2 + (dx / d) * d * 0.08;

        const gradient = ctx.createLinearGradient(ax, ay, bx, by);
        gradient.addColorStop(0, rgba(nodeColor(link.a), link.glow));
        gradient.addColorStop(1, rgba(nodeColor(link.b), link.glow));

        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.quadraticCurveTo(mx, my, bx, by);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = (0.8 + link.strength * 2.2) / Math.sqrt(camera.scale);
        ctx.lineCap = 'round';
        ctx.stroke();
      });
    }

    function nodeEntryScale(node, now) {
      const t = clamp((now - node.bornAt) / 480, 0, 1);
      return easeOutCubic(t);
    }

    function nodeFocusTarget(node) {
      if (!selectedId) return 1;
      if (node.id === selectedId || neighborIds.has(node.id)) return 1;
      return 0.13;
    }

    function drawNode(node, now) {
      node.focusAlpha += (nodeFocusTarget(node) - node.focusAlpha) * 0.12;
      const entry = nodeEntryScale(node, now);
      if (entry <= 0.01) return;

      const color = nodeColor(node);
      const r = node.r * entry * (node.id === hoveredId ? 1.12 : 1);
      const a = node.focusAlpha;
      const isSelected = node.id === selectedId;

      // halo
      const halo = ctx.createRadialGradient(node.x, node.y, r * 0.4, node.x, node.y, r * 2.6);
      halo.addColorStop(0, rgba(color, 0.34 * a));
      halo.addColorStop(1, rgba(color, 0));
      ctx.beginPath();
      ctx.arc(node.x, node.y, r * 2.6, 0, Math.PI * 2);
      ctx.fillStyle = halo;
      ctx.fill();

      // body with a soft top-light
      const body = ctx.createRadialGradient(
        node.x - r * 0.35, node.y - r * 0.4, r * 0.1,
        node.x, node.y, r
      );
      body.addColorStop(0, lighten(color, 0.45));
      body.addColorStop(0.55, color);
      body.addColorStop(1, rgba(color, 0.85));
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
      ctx.fillStyle = body;
      ctx.fill();

      ctx.lineWidth = 1 / camera.scale;
      ctx.strokeStyle = 'rgba(255,255,255,' + (0.22 * a).toFixed(3) + ')';
      ctx.stroke();
      ctx.globalAlpha = 1;

      if (isSelected) {
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 3 / camera.scale, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(249,250,251,0.9)';
        ctx.lineWidth = 2 / camera.scale;
        ctx.stroke();

        // expanding ripple
        const p = (now % 1700) / 1700;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r * (1.15 + p * 1.1), 0, Math.PI * 2);
        ctx.strokeStyle = rgba(color, (1 - p) * 0.45);
        ctx.lineWidth = 1.6 / camera.scale;
        ctx.stroke();
      }
    }

    function drawLabels(now) {
      const zoomFade = clamp((camera.scale - 0.42) / 0.28, 0, 1);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.font = '600 11px -apple-system, BlinkMacSystemFont, sans-serif';

      nodes.forEach((node) => {
        const entry = nodeEntryScale(node, now);
        const focused = selectedId &&
          (node.id === selectedId || neighborIds.has(node.id));
        let labelAlpha = Math.max(zoomFade, focused ? 1 : 0) *
          node.focusAlpha * entry;
        if (node.r * camera.scale < 3.5 && !focused) labelAlpha = 0;
        if (labelAlpha < 0.04) return;

        const sx = node.x * camera.scale + camera.x;
        const sy = node.y * camera.scale + camera.y + node.r * camera.scale + 7;
        let title = node.title;
        if (title.length > 22) title = title.slice(0, 21) + '…';

        ctx.shadowColor = 'rgba(0,0,0,0.85)';
        ctx.shadowBlur = 5;
        ctx.fillStyle = 'rgba(229,231,235,' + labelAlpha.toFixed(3) + ')';
        ctx.fillText(title, sx, sy);
        ctx.shadowBlur = 0;
      });
    }

    function render(now) {
      drawBackdrop(now);
      ctx.save();
      ctx.translate(camera.x, camera.y);
      ctx.scale(camera.scale, camera.scale);
      drawLinks();
      nodes.forEach((node) => drawNode(node, now));
      ctx.restore();
      drawLabels(now);
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);
    }

    function tick(now) {
      if (alpha > 0.012 || draggedNode) {
        stepPhysics();
        alpha *= draggedNode ? 1 : 0.986;
      }
      tickCamera();
      render(now);
      requestAnimationFrame(tick);
    }

    // -- input ----------------------------------------------------------------
    const pointers = new Map();
    let draggedNode = null;
    let gesture = null; // 'pan' | 'node' | 'pinch'
    let downAt = 0;
    let downX = 0;
    let downY = 0;
    let moved = 0;
    let lastTapAt = 0;
    let lastTapX = 0;
    let lastTapY = 0;
    let pinchStart = null;

    function findHit(point) {
      const slop = 10 / camera.scale;
      for (let i = nodes.length - 1; i >= 0; i--) {
        const node = nodes[i];
        const d = Math.hypot(node.x - point.x, node.y - point.y);
        if (d <= node.r + slop) return node;
      }
      return null;
    }

    function selectNode(node) {
      selectedId = node ? node.id : null;
      refreshNeighbors();
      if (node) focusOnNode(node);
      postToHost({ type: 'NODE_SELECTED', id: selectedId });
    }

    function beginPinch() {
      const pts = Array.from(pointers.values());
      pinchStart = {
        distance: Math.max(12, Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y)),
        midX: (pts[0].x + pts[1].x) / 2,
        midY: (pts[0].y + pts[1].y) / 2,
        scale: camera.scale,
        camX: camera.x,
        camY: camera.y,
      };
      gesture = 'pinch';
      if (draggedNode) { draggedNode.fixed = false; draggedNode = null; }
    }

    canvas.addEventListener('pointerdown', (event) => {
      canvas.setPointerCapture(event.pointerId);
      pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      userHasInteracted = true;
      cameraGoal = null;

      if (pointers.size === 2) {
        beginPinch();
        return;
      }

      downAt = performance.now();
      downX = event.clientX;
      downY = event.clientY;
      moved = 0;

      const hit = findHit(toWorld(event.clientX, event.clientY));
      if (hit) {
        gesture = 'node';
        draggedNode = hit;
        hit.fixed = true;
        alpha = Math.max(alpha, 0.3);
      } else {
        gesture = 'pan';
      }
    });

    canvas.addEventListener('pointermove', (event) => {
      const previous = pointers.get(event.pointerId);
      if (!previous) {
        if (event.pointerType === 'mouse') {
          const hit = findHit(toWorld(event.clientX, event.clientY));
          const nextHover = hit ? hit.id : null;
          if (nextHover !== hoveredId) {
            hoveredId = nextHover;
            canvas.style.cursor = hoveredId ? 'pointer' : 'default';
          }
        }
        return;
      }

      const dx = event.clientX - previous.x;
      const dy = event.clientY - previous.y;
      pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      moved += Math.abs(dx) + Math.abs(dy);

      if (gesture === 'pinch' && pointers.size >= 2 && pinchStart) {
        const pts = Array.from(pointers.values());
        const distance = Math.max(12, Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y));
        const midX = (pts[0].x + pts[1].x) / 2;
        const midY = (pts[0].y + pts[1].y) / 2;
        const nextScale = clamp(
          pinchStart.scale * (distance / pinchStart.distance),
          MIN_SCALE, MAX_SCALE
        );
        const ratio = nextScale / pinchStart.scale;
        camera.scale = nextScale;
        camera.x = midX - (pinchStart.midX - pinchStart.camX) * ratio;
        camera.y = midY - (pinchStart.midY - pinchStart.camY) * ratio;
        return;
      }

      if (gesture === 'node' && draggedNode) {
        const point = toWorld(event.clientX, event.clientY);
        draggedNode.x = point.x;
        draggedNode.y = point.y;
        alpha = Math.max(alpha, 0.25);
        return;
      }

      if (gesture === 'pan') {
        camera.x += dx;
        camera.y += dy;
      }
    });

    function endPointer(event) {
      pointers.delete(event.pointerId);

      if (pointers.size === 1 && gesture === 'pinch') {
        // hand off from pinch to pan with the remaining finger
        gesture = 'pan';
        pinchStart = null;
        return;
      }
      if (pointers.size > 0) return;

      const wasNode = gesture === 'node';
      gesture = null;
      pinchStart = null;
      if (draggedNode) {
        draggedNode.fixed = false;
        draggedNode = null;
      }

      const elapsed = performance.now() - downAt;
      const isTap = moved < TAP_SLOP && elapsed < TAP_MS;
      if (!isTap) return;

      const now = performance.now();
      const isDoubleTap = now - lastTapAt < DOUBLE_TAP_MS &&
        Math.hypot(event.clientX - lastTapX, event.clientY - lastTapY) < 36;
      lastTapAt = now;
      lastTapX = event.clientX;
      lastTapY = event.clientY;

      if (isDoubleTap) {
        lastTapAt = 0;
        fitToView(true);
        return;
      }

      if (wasNode) {
        const hit = findHit(toWorld(event.clientX, event.clientY));
        selectNode(hit);
      } else {
        selectNode(null);
      }
    }

    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);

    canvas.addEventListener('wheel', (event) => {
      event.preventDefault();
      userHasInteracted = true;
      zoomAt(event.clientX, event.clientY, Math.exp(-event.deltaY * 0.0016));
    }, { passive: false });

    canvas.addEventListener('contextmenu', (event) => event.preventDefault());

    document.getElementById('zoomIn').addEventListener('click', () => {
      userHasInteracted = true;
      zoomAt(width / 2, height / 2, 1.35);
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      userHasInteracted = true;
      zoomAt(width / 2, height / 2, 1 / 1.35);
    });
    document.getElementById('zoomFit').addEventListener('click', () => {
      userHasInteracted = true;
      fitToView(true);
    });

    // -- boot ---------------------------------------------------------------
    function resizeCanvas() {
      pixelRatio = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.max(1, Math.floor(width * pixelRatio));
      canvas.height = Math.max(1, Math.floor(height * pixelRatio));
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      rebuildBackdrop();
      if (!userHasInteracted && nodes.length > 0) fitToView(false);
    }

    window.addEventListener('message', (event) => ingestPayload(event.data));
    document.addEventListener('message', (event) => ingestPayload(event.data));
    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
