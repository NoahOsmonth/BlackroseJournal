<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="graphCanvas"></canvas>
  <script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const layerColors = {
      episodic: '#A370F7',
      semantic: '#38BDF8',
      profile: '#FB7185',
      procedural: '#34D399',
      note: '#FBBF24',
      working: '#F472B6',
    };

    let width = 0;
    let height = 0;
    let atoms = [];
    let connections = [];
    let transform = { x: 0, y: 0, scale: 1 };
    let dragStart = { x: 0, y: 0 };
    let isDragging = false;
    let selectedId = null;

    function resizeCanvas() {
      const pixelRatio = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.max(1, Math.floor(width * pixelRatio));
      canvas.height = Math.max(1, Math.floor(height * pixelRatio));
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
    }

    function initializeGraph(newAtoms, newConnections) {
      const existing = new Map(atoms.map((atom) => [atom.id, atom]));
      atoms = newAtoms.map((atom, index) => {
        const angle = (Math.PI * 2 * index) / Math.max(1, newAtoms.length);
        const radius = Math.min(width, height) * 0.28;
        const previous = existing.get(atom.id);

        return {
          ...atom,
          x: previous ? previous.x : width / 2 + Math.cos(angle) * radius,
          y: previous ? previous.y : height / 2 + Math.sin(angle) * radius,
          radius: 13 + (atom.salience || 3) * 1.7,
        };
      });
      connections = newConnections;
    }

    function postToHost(payload) {
      const encoded = JSON.stringify(payload);
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(encoded);
        return;
      }
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(encoded, '*');
      }
    }

    function ingestPayload(raw) {
      try {
        const payload = JSON.parse(raw);
        if (payload.type === 'SYNC_DATA') {
          initializeGraph(payload.atoms || [], payload.connections || []);
        }
      } catch {
        postToHost({ type: 'ENGINE_ERROR' });
      }
    }

    function toWorldPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left - transform.x) / transform.scale,
        y: (event.clientY - rect.top - transform.y) / transform.scale,
      };
    }

    function findHit(point) {
      let hit = null;
      atoms.forEach((atom) => {
        const distance = Math.hypot(atom.x - point.x, atom.y - point.y);
        if (distance <= atom.radius) hit = atom.id;
      });
      return hit;
    }

    function drawConnections() {
      connections.forEach((connection) => {
        const fromAtom = atoms.find((atom) => atom.id === connection.from);
        const toAtom = atoms.find((atom) => atom.id === connection.to);
        if (!fromAtom || !toAtom) return;

        ctx.beginPath();
        ctx.moveTo(fromAtom.x, fromAtom.y);
        ctx.lineTo(toAtom.x, toAtom.y);
        ctx.strokeStyle = `rgba(249, 250, 251, ${0.08 + connection.strength * 0.18})`;
        ctx.lineWidth = Math.max(1, connection.strength * 3);
        ctx.stroke();
      });
    }

    function drawAtom(atom) {
      ctx.beginPath();
      ctx.arc(atom.x, atom.y, atom.radius, 0, Math.PI * 2);
      ctx.fillStyle = layerColors[atom.layer] || '#9CA3AF';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = atom.id === selectedId ? 18 : 8;
      ctx.fill();
      ctx.shadowBlur = 0;

      if (atom.id === selectedId) {
        ctx.strokeStyle = '#F9FAFB';
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      ctx.fillStyle = '#F9FAFB';
      ctx.font = '600 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(atom.title.slice(0, 22), atom.x, atom.y + atom.radius + 15);
    }

    function tick() {
      atoms.forEach((atom) => {
        atom.x += (width / 2 - atom.x) * 0.002;
        atom.y += (height / 2 - atom.y) * 0.002;
      });

      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(transform.x, transform.y);
      ctx.scale(transform.scale, transform.scale);
      drawConnections();
      atoms.forEach(drawAtom);
      ctx.restore();
      requestAnimationFrame(tick);
    }

    window.addEventListener('message', (event) => ingestPayload(event.data));
    document.addEventListener('message', (event) => ingestPayload(event.data));
    window.addEventListener('resize', resizeCanvas);

    canvas.addEventListener('pointerdown', (event) => {
      isDragging = true;
      dragStart.x = event.clientX - transform.x;
      dragStart.y = event.clientY - transform.y;
    });

    canvas.addEventListener('pointermove', (event) => {
      if (!isDragging) return;
      transform.x = event.clientX - dragStart.x;
      transform.y = event.clientY - dragStart.y;
    });

    canvas.addEventListener('pointerup', (event) => {
      isDragging = false;
      const point = toWorldPoint(event);
      selectedId = findHit(point);
      postToHost({
        type: 'NODE_SELECTED',
        id: selectedId,
      });
    });

    canvas.addEventListener('wheel', (event) => {
      event.preventDefault();
      const nextScale = transform.scale + (event.deltaY < 0 ? 0.08 : -0.08);
      transform.scale = Math.min(2.4, Math.max(0.45, nextScale));
    }, { passive: false });

    resizeCanvas();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
